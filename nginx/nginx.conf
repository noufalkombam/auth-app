# ─────────────────────────────────────────
# HTTP (Certbot + Redirect)
# ─────────────────────────────────────────
server {
    listen 80;
    server_name noufalapp.fazilthekkan.live;

    # Certbot challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────
# HTTPS (Main App)
# ─────────────────────────────────────────
server {
    listen 443 ssl;
    server_name noufalapp.fazilthekkan.live;

    ssl_certificate /etc/letsencrypt/live/noufalapp.fazilthekkan.live/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/noufalapp.fazilthekkan.live/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    # ─── Backend API ───
    location ~ ^/(auth|users|health) {
        proxy_pass http://backend:5000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # 🔥 IMPORTANT
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── Frontend ───
    location / {
        proxy_pass http://frontend:80;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}